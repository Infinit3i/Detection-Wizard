name: Release

on:
  push:
    tags:
      - '*'

env:
  CARGO_TERM_COLOR: always

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          libgtk-3-dev \
          libglib2.0-dev \
          libatk1.0-dev \
          libgdk-pixbuf2.0-dev \
          libpango1.0-dev \
          libcairo2-dev \
          libwayland-dev \
          libxkbcommon-dev \
          libssl-dev \
          libvulkan-dev \
          pkg-config

    - name: Build release
      run: cargo build --release

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: detection-wizard-linux
        path: target/release/detection-wizard

  build-windows:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4

    - name: Build release
      run: cargo build --release

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: detection-wizard-windows
        path: target/release/detection-wizard.exe

  release:
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - name: Download Linux artifact
      uses: actions/download-artifact@v4
      with:
        name: detection-wizard-linux
        path: linux

    - name: Download Windows artifact
      uses: actions/download-artifact@v4
      with:
        name: detection-wizard-windows
        path: windows

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          linux/detection-wizard
          windows/detection-wizard.exe
